events {}

http {

    upstream auth_service {
        server auth_service:8001;
    }

    upstream shipment_service {
        server shipment_service:8002;
    }

    upstream tracking_service {
        server tracking_service:8003;
    }

    upstream hub_service {
        server hub_service:8004;
    }

    server {
        listen 80;

        location /auth/ {
            proxy_pass http://auth_service/;
        }

        location /shipments/ {
            proxy_pass http://shipment_service/;
        }

        location /tracking/ {
            proxy_pass http://tracking_service/;
        }

        location /hubs/ {
            proxy_pass http://hub_service/;
        }
    }
}